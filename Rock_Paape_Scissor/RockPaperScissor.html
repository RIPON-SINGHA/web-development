<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSOR</title>
</head>
<body>

    <button onclick="playGame('rock')"> ROCK </button>
    <button onclick="playGame('paper')"> PAPER </button>
    <button onclick="playGame('scissor')"> SCISSOR </button>
    <button onclick="
    score.win = 0;
    score.lose = 0;
    score.tie = 0;
    localStorage.removeItem('score');
    "> RESET GAME </button>

    <script> 
        let score = JSON.parse(localStorage.getItem('score')) ||
        {
            win: 0,
            lose: 0,
            tie: 0
        };

        function playGame(playerMove){
            let compMove = computerMove()
            let result = ''
            if (playerMove === 'rock') {
                if (compMove === 'rock') {
                    result = 'tie';
                } else if (compMove === 'paper') {
                    result = 'you lose';
                } else {
                    result = 'you win';
                }
            }

            if (playerMove === 'paper') {
                if (compMove === 'rock') {
                    result = 'you win';
                } else if (compMove === 'paper') {
                    result = 'tie';
                } else {
                    result = 'you lose';
                }
            }

            if (playerMove === 'scissor') {
                if (compMove === 'rock') {
                    result = 'you lose';
                } else if (compMove === 'paper') {
                    result = 'you win';
                } else {
                    result = 'tie'
                }
            }

            if (result === 'you win') {
                score.win += 1;
            } else if (result === 'you lose') {
                score.lose += 1;
            } else if (result === 'tie') {
                score.tie += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));


            alert(`You picked ${playerMove.toUpperCase()}. Computer picked ${compMove.toUpperCase()}. ${result.toUpperCase()}
Wins: ${score.win}, Losses: ${score.lose}, Ties: ${score.tie}`);

        }


        function computerMove(){
            let compMove = '';
            let randomNumber =  Math.random();

            if (randomNumber >= 0 && randomNumber < 1/3) {
                compMove = 'rock';
            } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                compMove = 'paper';
            } else if (randomNumber >= 2/3 && randomNumber < 1) {
                compMove = 'scissor'
            }

            return compMove;
        }
    </script>
</body>
</html>
