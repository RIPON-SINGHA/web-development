<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSOR</title>
</head>
<body>
    <h3>Rock Paper Scissor</h3>
    <button onclick="playGame('rock')"> Rock </button>
    <button onclick="playGame('paper')"> Paper </button>
    <button onclick="playGame('scissor')"> Scissor </button>
    <p id = "game-result"></p>
    <p id = "game-moves"></p>
    <p id = "game-score"> Win: 0, Lose: 0, Tie: 0 </p>
    <button onclick="resetBtn(gameResultElem, gameMovesElem)"> Reset Game </button>
    <script>
        let gameResultElem = document.querySelector("#game-result")
        let gameMovesElem = document.querySelector("#game-moves")

        let score = {
            win: 0,
            lose: 0,
            tie: 0
        }

        let savedScore = JSON.parse(localStorage.getItem('score'));

        if (savedScore) {
            score = savedScore;
        }

        showScore()

        function playGame(playerMove){
            let compMove = computerMove() 

            if (playerMove === compMove) {
                gameResultElem.innerHTML = "Tie";
                score.tie += 1;
            } else if ( 
                (playerMove === 'rock' && compMove === 'paper' ||
                playerMove === 'paper' && compMove === 'scissor' ||
                playerMove === 'scissor' && compMove === 'rock'
                )
            ) {
                gameResultElem.innerHTML = "You Lose!";
                score.lose += 1;
            } else {
                gameResultElem.innerHTML = "You Win!";
                score.win +=1;
            }

            showMoves(playerMove, compMove)
            showScore()

            localStorage.setItem('score', JSON.stringify(score))

            console.log(compMove)


        }

        function computerMove(){
            let compMove = '';
            let randomNumber =  Math.random();

            if (randomNumber >= 0 && randomNumber < 1/3) {
                compMove = 'rock';
            } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                compMove = 'paper';
            } else if (randomNumber >= 2/3 && randomNumber < 1) {
                compMove = 'scissor'
            }

            return compMove;
        }

        function resetBtn(gameResultElem, gameMovesElem){
            score = {
                win: 0,
                lose: 0,
                tie: 0
            }
            gameResultElem.innerHTML = ""
            gameMovesElem.innerHTML = ""
            showScore()
            localStorage.removeItem('score')
        }

        function showScore(){
            document.querySelector("#game-score").innerHTML = `
            Win: ${score.win}, Lose: ${score.lose}, Tie: ${score.tie}`
        }

        function showMoves(playerMove, compMove) {
            document.querySelector("#game-moves").innerHTML = `
            Your Move: ${playerMove.toUpperCase()}, Computer's Move: ${compMove.toUpperCase()}`
        }
    </script>

</body>
</html>
