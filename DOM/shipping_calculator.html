<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping calculator</title>
</head>
<body>
    <h3>Amazon Shipping calculator</h3>
    <p>Orders under $40 = +$10 shipping</p>
    <p>Orders over $50 = Free shipping</p>
    <input class="cost" type="text" onkeydown="calculateByEnter(event)"> <button onclick="showTotalCost()">calculate</button>
    <p class="cal-res"></p>

    <script>
        function showTotalCost(){
        let cost = Number(document.querySelector('.cost').value);
        let cal_res = document.querySelector('.cal-res')
        if (isNaN(cost)){
            cal_res.innerHTML = "cost should be in Numbers";
        } else if (cost <= 40) {
            cal_res.innerHTML = `The shipping cost is ${cost + 10}`;
        } else {
            cal_res.innerHTML = `The shipping cost is ${cost}`;
        }
    }

    function calculateByEnter(event){
        if(event.key === 'Enter') {
            showTotalCost()
        }
    }
    </script>
</body>
</html>
