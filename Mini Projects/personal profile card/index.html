<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal profile card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    
    <div class="profile-card">
        <div class="photo-placeholder">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/009/292/244/small/default-avatar-icon-of-social-media-user-vector.jpg" alt="profile pic">
        </div>
        <h3 class="name">Ripon Singha</h3>
        <h5 class="role">Software Engineer and AI Specialist</h5>
        <div class="self-bio">
            <p class="bio">Software Engineer | 💻 Turning coffee into clean code. Passionate about building scalable apps, Python, and Java Script. Let's build the future together!</p>
        </div>
        <div class="details">
            <div class="info-row">
                <span class="info-label">Phone</span>
                <span class="info-value">: 9876543231</span>
            </div>
            <div class="info-row">
                <span class="info-label">E-mail</span>
                <span class="info-value">: myEmail123@gmail.com</span>
            </div>
            <div class="info-row">
                <span class="info-label">GitHub</span>
                <span class="info-value">: https://github.com/RIPON-SINGHA</span>
            </div>
        </div>
        <div class="links">
            <i class="fa-brands fa-x-twitter"></i>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
        </div>
    </div>
</body>
</html>
